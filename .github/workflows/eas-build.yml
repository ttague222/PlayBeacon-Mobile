name: EAS Build

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (ios | android | all)'
        required: true
        default: 'all'
        type: choice
        options:
          - ios
          - android
          - all
      profile:
        description: 'Build profile (development | preview | production)'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    name: Build on EAS
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Verify configuration
        run: |
          echo "Verifying app.json and eas.json configuration..."
          npx expo config --type public

      - name: Build on EAS
        run: |
          # Determine platform and profile
          PLATFORM="${{ github.event.inputs.platform || 'all' }}"
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"

          # Auto-submit for preview/production builds
          AUTO_SUBMIT=""
          if [ "$PROFILE" != "development" ]; then
            AUTO_SUBMIT="--auto-submit"
          fi

          # Trigger build
          eas build \
            --platform $PLATFORM \
            --profile $PROFILE \
            --non-interactive \
            --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Comment PR with build link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const message = `🚀 EAS Build triggered for this PR!

            View build progress: https://expo.dev/accounts/${{ github.repository_owner }}/projects/playbeacon/builds

            Platform: \`${{ github.event.inputs.platform || 'all' }}\`
            Profile: \`${{ github.event.inputs.profile || 'preview' }}\``;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
